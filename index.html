<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Nature Explorer</title>
    <style>
        /* --- Accessibility: Skip to Main Content --- */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 10px;
            background: #2c3e50;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            z-index: 100;
            transition: top 0.2s ease;
        }
        .skip-link:focus {
            top: 10px;
        }

        /* --- Navigation Styling (Flexbox + 3+ Properties) --- */
        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #2c3e50;
            padding: 15px 20px;
            font-family: Arial, sans-serif;
        }
        nav a {
            color: #ecf0f1;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 5px 10px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        /* --- Hover Effect --- */
        nav a:hover {
            background-color: #27ae60;
            border-radius: 4px;
            transform: scale(1.1);
        }

        /* --- Core Layout & Box Model --- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
        }
        main {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        /* --- Image Box Model --- */
        .featured-img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border: 5px solid #2c3e50;
            padding: 10px;
            border-radius: 15px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to Main Content</a>

    <nav>
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="collection.html">Collection</a>
    </nav>

    <main id="main-content">
        <h1>Welcome to fish collection</h1>
        <p>Discover the breathtaking beauty of the natural world through our curated collections.</p>
        <img src="https://files.nc.gov/deq/styles/article_card/public/images/2021-10/skipjack-tuna.jpg?VersionId=XpNaFvIzRlQTeQ9vaN_w_xkpgz7pgdI0&itok=H2C180OT" alt="A picture of a tuna" class="featured-img">
    </main>

</body>
</html>
